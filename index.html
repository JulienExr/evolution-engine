<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evolution Engine</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="sim-stage" aria-label="Simulation">
        <canvas id="world" aria-label="Prairie isometrique avec lapins evolutifs"></canvas>
        <div class="top-bar">
          <div class="brand">
            <span class="brand-mark"></span>
            <div>
              <h1>Evolution Engine</h1>
              <p>Selection naturelle en prairie isometrique</p>
            </div>
          </div>
          <div class="run-controls" aria-label="Controle de lecture">
            <button id="pauseBtn" type="button">Pause</button>
            <button id="resetBtn" type="button">Reset</button>
          </div>
        </div>
      </section>

      <aside class="side-panel" aria-label="Parametres et statistiques">
        <section class="panel-section">
          <div class="section-title">
            <h2>Parametres</h2>
            <span id="speedLabel">1.0x</span>
          </div>

          <label class="control-row">
            <span>Vitesse</span>
            <input id="speedInput" type="range" min="0.25" max="4" value="1" step="0.25" />
          </label>

          <label class="control-row">
            <span>Nourriture</span>
            <input id="foodInput" type="range" min="60" max="260" value="145" step="5" />
          </label>

          <label class="control-row">
            <span>Mutations</span>
            <input id="mutationInput" type="range" min="0.01" max="0.18" value="0.07" step="0.01" />
          </label>

          <div class="button-grid">
            <button id="climateBtn" type="button">Climat stable</button>
            <button id="pressureBtn" type="button">Pression faible</button>
          </div>
        </section>

        <section class="panel-section stats-grid" aria-label="Statistiques">
          <div>
            <span>Population</span>
            <strong id="statPopulation">0</strong>
          </div>
          <div>
            <span>Generation</span>
            <strong id="statGeneration">0</strong>
          </div>
          <div>
            <span>Naissances</span>
            <strong id="statBirths">0</strong>
          </div>
          <div>
            <span>Morts</span>
            <strong id="statDeaths">0</strong>
          </div>
        </section>

        <section class="panel-section traits">
          <h2>Traits moyens</h2>
          <div class="trait-row">
            <span>Vitesse</span>
            <meter id="traitSpeed" min="0" max="1" value="0.5"></meter>
          </div>
          <div class="trait-row">
            <span>Vision</span>
            <meter id="traitVision" min="0" max="1" value="0.5"></meter>
          </div>
          <div class="trait-row">
            <span>Metabolisme</span>
            <meter id="traitMetabolism" min="0" max="1" value="0.5"></meter>
          </div>
          <div class="trait-row">
            <span>Taille</span>
            <meter id="traitSize" min="0" max="1" value="0.5"></meter>
          </div>
        </section>

        <section class="panel-section chart-section">
          <h2>Evolution</h2>
          <canvas id="chart" width="320" height="150" aria-label="Graphique population et vitesse"></canvas>
        </section>
      </aside>
    </main>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
